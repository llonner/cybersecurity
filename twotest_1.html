<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Что такое вредоносная программа? | Вопрос 1</title>
		<link rel="icon" href="img/icon.jpg" type="image/x-icon" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&family=Tektur:wght@400..900&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background-color: #2b2b2b;
				font-family: 'Playpen Sans', cursive;
				color: #e0e0e0;
				line-height: 1.6;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}

			.wrapper {
				max-width: 1200px;
				width: 92%;
				margin: 0 auto;
				flex: 1;
				display: flex;
				flex-direction: column;
				padding: 2rem 0 3rem 0;
			}

			.home-button {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				background-color: #3c3c3c;
				color: #e0e0e0;
				text-decoration: none;
				font-weight: 500;
				padding: 0.6rem 1.5rem;
				border-radius: 40px;
				border: 1px solid #5a5a5a;
				transition: all 0.2s ease;
				font-size: 1rem;
				margin-bottom: 2rem;
				align-self: flex-start;
			}

			.home-button:hover {
				background-color: #4f4f4f;
				border-color: #9b59b6;
				color: white;
				transform: translateX(-3px);
			}

			.home-button::before {
				content: '←';
				font-size: 1.2rem;
				font-weight: bold;
			}

			.page-header {
				margin-bottom: 2.5rem;
			}

			.page-title {
				font-size: 2.2rem;
				font-weight: 600;
				color: #ffffff;
				margin-bottom: 0.5rem;
				border-left: 6px solid #a0a0a0;
				padding-left: 1.2rem;
			}

			.page-subtitle {
				font-size: 1.1rem;
				color: #b8b8b8;
				margin-left: 1.8rem;
			}

			.test-block {
				background-color: #3c3c3c;
				border-radius: 28px;
				padding: 2.5rem;
				margin-bottom: 2rem;
				border: 1px solid #5a5a5a;
				box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.7);
			}

			.test-header {
				font-size: 1.5rem;
				font-weight: 600;
				color: #ffffff;
				margin-bottom: 1.5rem;
				padding-bottom: 0.8rem;
				border-bottom: 2px solid #4f4f4f;
			}

			.question-text {
				font-size: 1.2rem;
				color: #ffffff;
				margin-bottom: 1.5rem;
			}

			.options-group {
				display: flex;
				flex-direction: column;
				gap: 1rem;
				margin-bottom: 2rem;
			}

			.option-item {
				display: flex;
				align-items: flex-start;
				gap: 1rem;
				background-color: #2f2f2f;
				padding: 1.2rem 1.5rem;
				border-radius: 16px;
				border: 2px solid #5a5a5a;
				cursor: pointer;
				transition: none;
			}

			.option-item.disabled {
				pointer-events: none;
				opacity: 0.9;
			}

			.option-item.correct-selected {
				background-color: #1e4a2e;
				border-color: #2ecc71;
			}

			.option-item.incorrect-selected {
				background-color: #4a1e1e;
				border-color: #e74c3c;
			}

			.option-item input[type='radio'],
			.option-item input[type='checkbox'] {
				appearance: none;
				-webkit-appearance: none;
				width: 1.3rem;
				height: 1.3rem;
				border: 2px solid #888;
				border-radius: 50%;
				background-color: #2f2f2f;
				cursor: pointer;
				position: relative;
				transition: all 0.2s;
				flex-shrink: 0;
				margin-top: 0.2rem;
				pointer-events: none;
			}

			.option-item input[type='checkbox'] {
				border-radius: 4px;
			}

			.option-item input[type='radio']:checked {
				border-color: #9b59b6;
				background-color: #9b59b6;
				box-shadow: inset 0 0 0 3px #2f2f2f;
			}

			.option-item input[type='checkbox']:checked {
				border-color: #9b59b6;
				background-color: #9b59b6;
			}

			.option-item input[type='checkbox']:checked::after {
				content: '✓';
				color: white;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-size: 0.9rem;
				font-weight: bold;
			}

			.option-item.correct-selected input[type='radio'],
			.option-item.correct-selected input[type='checkbox'] {
				border-color: #2ecc71;
				background-color: #2ecc71;
			}

			.option-item.incorrect-selected input[type='radio'],
			.option-item.incorrect-selected input[type='checkbox'] {
				border-color: #e74c3c;
				background-color: #e74c3c;
			}

			.option-text,
			.checkbox-text {
				font-size: 1.1rem;
				color: #e0e0e0;
				flex: 1;
			}

			.option-badge {
				font-size: 0.85rem;
				font-weight: 600;
				padding: 0.2rem 1rem;
				border-radius: 40px;
				white-space: nowrap;
			}

			.option-item.correct-selected .option-badge {
				background-color: #2ecc71;
				color: #000;
			}

			.option-item.incorrect-selected .option-badge {
				background-color: #e74c3c;
				color: #fff;
			}

			.block-status-container {
				margin-top: 1.5rem;
			}

			.block-status {
				display: inline-block;
				padding: 0.5rem 1.5rem;
				background-color: #2f2f2f;
				border-radius: 40px;
				border: 1px solid #5a5a5a;
				font-size: 1rem;
				color: #d0d0d0;
			}

			.bottom-nav {
				display: flex;
				justify-content: flex-end;
				margin-top: 2rem;
			}

			.nav-btn {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				background-color: #3c3c3c;
				color: #e0e0e0;
				text-decoration: none;
				font-weight: 500;
				padding: 0.8rem 2.5rem;
				border-radius: 40px;
				border: 1px solid #5a5a5a;
				transition: all 0.2s ease;
				font-size: 1.1rem;
			}

			.nav-btn:hover {
				background-color: #4f4f4f;
				border-color: #9b59b6;
				color: white;
			}

			.nav-btn.next::after {
				content: '→';
				font-size: 1.2rem;
				font-weight: bold;
				margin-left: 0.5rem;
			}

			@media (max-width: 700px) {
				.page-title {
					font-size: 1.8rem;
				}
				.test-block {
					padding: 1.8rem;
				}
				.test-header {
					font-size: 1.3rem;
				}
				.option-item {
					padding: 1rem;
				}
				.bottom-nav {
					justify-content: center;
				}
				.nav-btn {
					width: 100%;
					justify-content: center;
				}
			}

			@media (max-width: 480px) {
				.page-title {
					font-size: 1.6rem;
				}
				.test-block {
					padding: 1.5rem;
				}
			}
		</style>
	</head>
	<body>
		<div class="wrapper">
			<a href="twotest.html" class="home-button">Назад</a>

			<div class="page-header">
				<h1 class="page-title">Что такое вредоносная программа?</h1>
				<div class="page-subtitle">Разбираемся в основах кибербезопасности</div>
			</div>

			<div class="test-block" id="block1">
				<div class="test-header">Выбери верное утверждение:</div>

				<div class="options-group" id="radioGroup">
					<label class="option-item" data-correct="true" data-index="0">
						<input type="radio" name="radioQuestion" />
						<span class="option-text"
							>Вредоносной программой может быть любой тип программного
							обеспечения, предназначенного для нанесения вреда или
							мошеннических действий</span
						>
						<span class="option-badge"></span>
					</label>
					<label class="option-item" data-correct="false" data-index="1">
						<input type="radio" name="radioQuestion" />
						<span class="option-text"
							>Вредоносной программой может быть только нелицензионное
							программное обеспечение</span
						>
						<span class="option-badge"></span>
					</label>
					<label class="option-item" data-correct="false" data-index="2">
						<input type="radio" name="radioQuestion" />
						<span class="option-text"
							>Вредоносной программой может быть любой тип программного
							обеспечения, предназначенного для использования на любом
							устройстве</span
						>
						<span class="option-badge"></span>
					</label>
				</div>

				<div class="block-status-container">
					<div class="block-status" id="block1Status">Блок еще не пройден</div>
				</div>
			</div>

			<div class="test-block" id="block2">
				<div class="test-header">
					Выбери способы, с помощью которых может произойти атака на устройства
					пользователей
				</div>
				<div
					class="question-text"
					style="
						font-size: 1rem;
						color: #b8b8b8;
						margin-top: -0.5rem;
						margin-bottom: 1.5rem;
					"
				>
					Выберите все подходящие ответы:
				</div>

				<div class="options-group" id="checkboxGroup">
					<label class="option-item" data-correct="true" data-index="0">
						<input type="checkbox" />
						<span class="option-text"
							>Письмо со ссылкой для получения денежного приза</span
						>
						<span class="option-badge"></span>
					</label>
					<label class="option-item" data-correct="false" data-index="1">
						<input type="checkbox" />
						<span class="option-text">Обновление программного обеспечения</span>
						<span class="option-badge"></span>
					</label>
					<label class="option-item" data-correct="true" data-index="2">
						<input type="checkbox" />
						<span class="option-text">USB-диски</span>
						<span class="option-badge"></span>
					</label>
					<label class="option-item" data-correct="true" data-index="3">
						<input type="checkbox" />
						<span class="option-text">Вложения, зараженные вирусом</span>
						<span class="option-badge"></span>
					</label>
				</div>

				<div class="block-status-container">
					<div class="block-status" id="block2Status">Блок еще не пройден</div>
				</div>
			</div>

			<div class="bottom-nav">
				<a href="twotest_2.html" class="nav-btn next">Следующая страница</a>
			</div>
		</div>

		<script src="./javascripts/twotest/scirpt_onetest.js"></script>
	</body>
</html>
